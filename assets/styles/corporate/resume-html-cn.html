<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姓名 - 简历</title>
<style>
  /* Paste full CSS from assets/styles/corporate/resume-css.css */
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <img class="avatar" src="data:image/jpeg;base64,..." alt="姓名">
      <div class="header-info">
        <h1>姓名</h1>
        <div class="contacts">
          <a href="tel:1xx">电话</a>
          <a href="mailto:xx@xx.com">邮箱</a>
          <a href="https://github.com/xx">GitHub</a>
        </div>
      </div>
    </div>
    <div class="tag-row">
      <span class="tag">标签1</span>
      <span class="tag">标签2</span>
      <span class="tag">标签3</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">技能</div>
    <div class="skills-grid">
      <div class="skill-card">
        <div class="label">语言</div>
        <div class="value">Java, Python, Go</div>
      </div>
      <div class="skill-card">
        <div class="label">AI / ML</div>
        <div class="value">PyTorch, LLM, Agent</div>
      </div>
      <div class="skill-card">
        <div class="label">框架</div>
        <div class="value">Spring Cloud, FastAPI</div>
      </div>
      <div class="skill-card">
        <div class="label">基建</div>
        <div class="value">K8s, Docker, MySQL</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">工作经历</div>
    <div class="job-card featured">
      <div class="job-header">
        <div>
          <div class="job-company">公司名</div>
          <div class="job-role">职位 → 更高职位</div>
        </div>
        <div class="job-period">2025.02 — 至今</div>
      </div>
      <div class="job-desc">一段话描述核心职责</div>
      <div class="job-group">
        <div class="job-group-title">模块标题</div>
        <ul>
          <li>工作内容，<span class="metric">量化指标</span></li>
          <li>另一项工作</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">教育背景</div>
    <table class="edu-table">
      <thead><tr><th>时间</th><th>学校</th><th>学院</th><th>学位</th></tr></thead>
      <tbody>
        <tr><td>2020 — 2024</td><td>学校</td><td>学院</td><td>硕士</td></tr>
        <tr><td>2016 — 2020</td><td>学校</td><td>学院</td><td>学士</td></tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
