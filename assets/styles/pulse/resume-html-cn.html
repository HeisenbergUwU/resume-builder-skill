<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姓名 - 简历</title>
<style>
  /* Paste full CSS from assets/styles/pulse/resume-css.css */
</style>
</head>
<body>
<div class="container">

  <!-- 深色 Hero 头部 -->
  <div class="header">
    <div class="header-top">
      <img class="avatar" src="data:image/jpeg;base64,..." alt="姓名">
      <div class="header-info">
        <h1>姓名</h1>
        <div class="subtitle">软件工程师 | 全栈开发</div>
        <div class="contacts">
          <a href="tel:1xx">电话</a>
          <a href="mailto:xx@xx.com">邮箱</a>
          <a href="https://github.com/xx">GitHub</a>
        </div>
      </div>
      <div class="tag-row">
        <span class="tag">React</span>
        <span class="tag">TypeScript</span>
        <span class="tag">Node.js</span>
        <span class="tag">AWS</span>
      </div>
    </div>
  </div>

  <!-- 关于（亮色） -->
  <div class="section section-light">
    <div class="section-title">关于</div>
    <div class="about-content">
      <p>个人简介，2-3句话概括你的背景和技术热情。</p>
    </div>
    <div class="about-grid">
      <div class="about-item">
        <div class="icon">📍</div>
        <div><span class="label">城市：</span><span class="value">北京</span></div>
      </div>
      <div class="about-item">
        <div class="icon">🎯</div>
        <div><span class="label">经验：</span><span class="value">X 年</span></div>
      </div>
    </div>
  </div>

  <!-- 工作经历（暗色） -->
  <div class="section section-dark">
    <div class="section-title">工作经历</div>
    <div class="job-card">
      <div class="job-header">
        <div>
          <div class="job-company">公司名</div>
          <div class="job-role">职位 → 更高职位</div>
        </div>
        <div class="job-period">2025.02 — 至今</div>
      </div>
      <div class="job-desc">一段话描述核心职责</div>
      <div class="job-group">
        <div class="job-group-title">模块标题</div>
        <ul>
          <li>工作内容，<span class="metric">量化指标</span></li>
          <li>另一项工作</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 技能（亮色） -->
  <div class="section section-light">
    <div class="section-title">技能</div>
    <div class="skills-grid">
      <div class="skill-group">
        <div class="skill-group-title">语言</div>
        <div class="skill-item">
          <div class="skill-name"><span>TypeScript</span><span>95%</span></div>
          <div class="skill-bar"><div class="skill-fill" style="width: 95%"></div></div>
        </div>
        <div class="skill-item">
          <div class="skill-name"><span>Python</span><span>85%</span></div>
          <div class="skill-bar"><div class="skill-fill" style="width: 85%"></div></div>
        </div>
      </div>
      <div class="skill-group">
        <div class="skill-group-title">框架</div>
        <div class="skill-item">
          <div class="skill-name"><span>React / Next.js</span><span>95%</span></div>
          <div class="skill-bar"><div class="skill-fill" style="width: 95%"></div></div>
        </div>
        <div class="skill-item">
          <div class="skill-name"><span>Node.js</span><span>80%</span></div>
          <div class="skill-bar"><div class="skill-fill" style="width: 80%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 教育背景（暗色） -->
  <div class="section section-dark">
    <div class="section-title">教育背景</div>
    <table class="edu-table">
      <thead><tr><th>时间</th><th>学校</th><th>学院</th><th>学位</th></tr></thead>
      <tbody>
        <tr><td>2020 — 2024</td><td>学校</td><td>学院</td><td>硕士</td></tr>
        <tr><td>2016 — 2020</td><td>学校</td><td>学院</td><td>学士</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 页脚 -->
  <div class="footer section-dark">
    <a href="#" class="back-to-top">↑</a>
    <div class="footer-text"></div>
  </div>

</div>
</body>
</html>
